version: "3.8"

services:
  capabilities-abuse:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: howl-capabilities-abuse
    ports:
      - "22:22"
      - "8080:8080"
    restart: unless-stopped
    labels:
      - "howl.target=capabilities-abuse"
      - "howl.difficulty=medium"
