<!DOCTYPE html>
<html>
<head><title>DataPulse - Login</title></head>
<body style="font-family: Arial; max-width: 400px; margin: 100px auto;">
<h2>DataPulse Analytics - Login</h2>
{% if error %}
<p style="color: red;">{{ error }}</p>
{% endif %}
<form method="POST">
<div style="margin: 10px 0;">
<label>Email:</label><br>
<input type="email" name="email" style="width: 100%; padding: 8px;" required>
</div>
<div style="margin: 10px 0;">
<label>Password:</label><br>
<input type="password" name="password" style="width: 100%; padding: 8px;" required>
</div>
<button type="submit" style="padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer;">Login</button>
</form>
</body>
</html>
