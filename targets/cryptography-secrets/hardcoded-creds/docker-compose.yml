version: "3.8"

services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webapp
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    restart: unless-stopped
    labels:
      - "howl.target=hardcoded-creds"
      - "howl.difficulty=easy"

  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: r00t_db_p@ss!
      MYSQL_DATABASE: inventory
      MYSQL_USER: inventory_admin
      MYSQL_PASSWORD: "V@ntage_S3cret!2024"
    volumes:
      - ./app/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    labels:
      - "howl.target=hardcoded-creds"
      - "howl.difficulty=easy"
